name: Bug report
description: Something is broken or behaves unexpectedly.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report. Please include as much detail as possible.

  - type: input
    id: version
    attributes:
      label: Parchment version
      description: "Found in Settings → About, or the image tag (e.g. `v0.1.11`)."
      placeholder: "v0.1.11"
    validations:
      required: true

  - type: dropdown
    id: deploy
    attributes:
      label: Deployment type
      options:
        - All-in-one Docker image (production)
        - docker compose (dev)
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste any console errors, server logs, or screenshots here.
      render: shell

  - type: input
    id: browser
    attributes:
      label: Browser / OS
      placeholder: "Chrome 126 / macOS 14"

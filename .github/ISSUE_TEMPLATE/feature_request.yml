name: Feature request
description: Suggest an improvement or new capability.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Please describe the feature you'd like and the problem it solves.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: A clear description of the pain point or missing capability.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like it to work? Screenshots or mockups welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've tried.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Editor
        - File manager
        - Collaboration
        - Export / Import
        - Search
        - Authentication
        - Settings / themes
        - Disk mirror / Git
        - Docker / deployment
        - Other
    validations:
      required: true

name: CI

# PR + push gate. Mirrors the local release gate: biome 0/0, tsc 0, unit pass,
# `pnpm build` compiles, the K4 19-route axe a11y harness is 0-violations, and
# the carry-forward gate (scope.md has no silently-Open items) is green.
on:
  pull_request:
  push:
    branches:
      - main
      - 'release/**'
  # release.yml calls this same gate on a tag, so the tag publish is gated on the
  # identical typecheck/lint/unit/build/e2e-a11y/carry-forward jobs.
  workflow_call:

# Allow the release workflow (and re-runs) to reuse these jobs via workflow_call.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Exclude Testcontainers integration tests — the unit gate is hermetic.
      - run: pnpm exec vitest run --exclude '**/integration/**'

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          # Phase 0 §7a/§1a: env.ts hard-requires PARCHMENT_PUBLIC_URL at import time,
          # and rejects a malformed PARCHMENT_SECRET_KEY; `next build` evaluates env.ts
          # while compiling the route modules. Provide deterministic build-time values.
          PARCHMENT_PUBLIC_URL: https://ci.parchment.example.com
          PARCHMENT_SECRET_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=

  verify-carry-forward-closed:
    # The Cairn "carry-forward closed" gate: fail if scope.md has any Open item.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node scripts/verify-carry-forward-closed.mjs

  compose-lint:
    # C6: Validate docker-compose.yml and docker-compose.dev.yml parse cleanly.
    # Required env vars with :? are supplied so the validation does not abort.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose.yml
        env:
          POSTGRES_PASSWORD: ci_test_pw
          POSTGRES_USER: parchment
          POSTGRES_DB: parchment
          PARCHMENT_SECRET_KEY: Y2ktdGVzdC1rZXktMzItYnl0ZXMtZm9yLWNpLW9ubHk=
          PARCHMENT_PUBLIC_URL: https://ci.example.com
        run: docker compose config --quiet
      - name: Validate docker-compose.dev.yml
        run: docker compose -f docker-compose.dev.yml config --quiet

  image-size:
    # C1: Gate image size. History: 600 MB (v0.1.x, Postgres-stripped) → 2400 MB
    # (v0.2.0 shipped the FULL build node_modules so the tsx collab server could
    # resolve its deps + ~50 features' worth of deps → ~1.95 GB).
    # v0.2.2: the runner now ships a PROD-ONLY node_modules (tsx promoted to a
    # dependency; dev toolchain — typescript/vitest/biome/drizzle-kit/jsdom/
    # playwright — dropped). The node_modules layer drops ~30% (measured 1.1 GB →
    # 768 MB locally), so the budget tightens to 1800 MB. NOTE: re-tighten toward
    # the actual built size once a CI run reports it (kept some headroom because
    # the multi-arch image carries amd64+arm64 esbuild/swc platform binaries).
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build app image
        run: docker build -t parchment-size-check .
      - name: Check image size (must be under 1800 MB)
        run: |
          SIZE=$(docker image inspect parchment-size-check \
            --format '{{.Size}}')
          MAX=$((1800 * 1024 * 1024))
          echo "Image size: $SIZE bytes (max $MAX)"
          [ "$SIZE" -lt "$MAX" ] || { echo "Image too large!"; exit 1; }

  e2e-a11y:
    # The K4 19-route axe-core a11y harness (Playwright + @axe-core/playwright),
    # 0 WCAG 2 A/AA violations. Needs a pgvector-capable Postgres 18 for the
    # `CREATE EXTENSION vector` in migration 0000.
    runs-on: ubuntu-latest
    needs: [typecheck, lint, unit, build]
    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_USER: parchment
          POSTGRES_PASSWORD: parchment
          POSTGRES_DB: parchment
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U parchment"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # global-setup + playwright webServer read these; drizzle migrate uses DATABASE_URL.
      DATABASE_URL: postgres://parchment:parchment@127.0.0.1:5434/parchment
      E2E_DATABASE_URL: postgres://parchment:parchment@127.0.0.1:5434/parchment
      NEXT_TELEMETRY_DISABLED: '1'
      CI: 'true'
      # Phase 0 §7a/§1a: required by env.ts at both `pnpm build` and `pnpm start` (the
      # Playwright webServer). Without PARCHMENT_PUBLIC_URL the server refuses to boot.
      PARCHMENT_PUBLIC_URL: http://127.0.0.1:3000
      PARCHMENT_SECRET_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply migrations to the e2e DB
        run: pnpm db:migrate
      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium
      - name: Build (Playwright webServer runs `pnpm start`)
        run: pnpm build
      - name: Run Playwright + axe a11y harness
        # Only the chromium (axe) project. The S1-0 `visual` project is a
        # controller-local gate (per-platform screenshot baselines committed for
        # darwin); it is NOT run in CI to avoid cross-OS pixel drift.
        run: pnpm exec playwright test --project=chromium
      - name: Upload a11y report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-report
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7

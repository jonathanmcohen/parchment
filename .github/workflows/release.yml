name: Release

# Tag-triggered publish. Pushing a `v*` tag (e.g. v0.1.0) on main re-runs the
# full CI gate (typecheck/lint/unit/build/e2e-a11y + carry-forward closed) and,
# only if green, builds + pushes the multi-arch image to GHCR.
#
# The release branch (release/v0.1.0) is NEVER deleted here — the user wants old
# release branches kept. There is no branch-cleanup step anywhere in this file.
on:
  push:
    tags:
      - 'v*'

jobs:
  # Re-run the identical PR/push gate (incl. the e2e+a11y 19-route axe harness and
  # the carry-forward-closed check) so the tag publish can never outrun the gate.
  gate:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # Multi-arch (amd64 + arm64) builds run on the GitHub-hosted runner via QEMU
      # emulation + buildx — the user's stated preference (not local builds).
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/jonathanmcohen/parchment
          # type=ref,event=tag yields the literal git tag (v0.1.0) so the published
          # image name matches the documented ghcr.io/jonathanmcohen/parchment:v0.1.0
          # (scope L1). Plus the moving :latest tag.
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          # CF2: stamp the image with the commit it was built from. version.ts
          # BUILD_SHA reads process.env.GIT_SHA → shown on the /whats-new About page.
          build-args: |
            GIT_SHA=${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # I8: container security scan. Runs AFTER publish so the pushed image is
  # available to pull. Fails the workflow ONLY on FIXED HIGH/CRITICAL CVEs.
  # All-severity results are uploaded to the GitHub Security tab as SARIF.
  #
  # Two reliability fixes, learned the hard way (v0.2.0–v0.2.5 all red here):
  #
  # 1. Scan a CONCRETE linux/amd64 DIGEST, not the multi-arch tag. The publish step
  #    attaches buildx SBOM + provenance attestations (provenance:true/sbom:true),
  #    so the tag's manifest LIST carries two extra `unknown/unknown` in-toto
  #    manifests; resolving the amd64 platform digest and scanning THAT avoids any
  #    attestation-manifest resolution ambiguity.
  #
  # 2. DECOUPLE the SARIF upload from the pass/fail GATE. aquasecurity/trivy-action
  #    in `format: sarif` mode builds the report with ALL severities and its
  #    `exit-code: 1` then fires on ANY severity — IGNORING the `severity:
  #    HIGH,CRITICAL` input. So a mere MEDIUM/LOW finding (this image has 3 MEDIUMs)
  #    failed the release even though there are ZERO HIGH/CRITICAL. The fix: the
  #    trivy-action step only WRITES the SARIF (exit-code 0, never fails); a
  #    separate `trivy` table run with `--severity HIGH,CRITICAL --ignore-unfixed
  #    --exit-code 1` is the actual gate. Verified locally on the published amd64
  #    digest: the gate run is exit 0 (0 HIGH/CRITICAL), while the all-severity
  #    sarif run is exit 1 (the MEDIUMs) — hence the split.
  scan:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read           # pull the image + inspect the manifest list
      security-events: write   # required to upload SARIF to GitHub Security tab
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve the linux/amd64 platform digest
        id: digest
        run: |
          set -euo pipefail
          REF="ghcr.io/jonathanmcohen/parchment:${{ github.ref_name }}"
          # imagetools is part of buildx (preinstalled on ubuntu-latest). Pull the
          # per-platform manifest digest for linux/amd64 from the manifest list.
          AMD64_DIGEST="$(docker buildx imagetools inspect "$REF" --format '{{json .}}' \
            | jq -r '.manifest.manifests[]
                     | select(.platform.os=="linux" and .platform.architecture=="amd64")
                     | .digest' | head -n1)"
          if [ -z "$AMD64_DIGEST" ] || [ "$AMD64_DIGEST" = "null" ]; then
            echo "::error::could not resolve a linux/amd64 digest for $REF" >&2
            docker buildx imagetools inspect "$REF" || true
            exit 1
          fi
          echo "ref=ghcr.io/jonathanmcohen/parchment@${AMD64_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Scanning ghcr.io/jonathanmcohen/parchment@${AMD64_DIGEST}"

      # SARIF for the Security tab — informational only, NEVER fails the job
      # (exit-code 0). This is the all-severity report.
      - name: Trivy — build SARIF report (all severities, non-blocking)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.digest.outputs.ref }}
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
          exit-code: '0'          # informational; the gate is the next step

      - name: Upload Trivy scan results to GitHub Security tab
        if: always()              # upload even if a later step fails
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      # The actual GATE: run the Trivy CLI directly (NOT the action wrapper, which
      # in sarif mode ignores the severity filter for its exit code). Table format,
      # --severity HIGH,CRITICAL, --ignore-unfixed, --exit-code 1 → exits non-zero
      # ONLY on a FIXED HIGH/CRITICAL. Pinned Trivy version to match the action's,
      # with the DB cached across the two scans via the shared cache dir. Verified
      # locally on the published amd64 digest: exit 0 (0 HIGH/CRITICAL; 3 MEDIUMs
      # are below the gate threshold and correctly do NOT fail it).
      - name: Trivy — fail on FIXED HIGH/CRITICAL (the gate)
        env:
          GATE_REF: ${{ steps.digest.outputs.ref }}
          REG_USER: ${{ github.actor }}
          REG_PASS: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          docker run --rm \
            -e TRIVY_USERNAME="$REG_USER" \
            -e TRIVY_PASSWORD="$REG_PASS" \
            -v "${{ github.workspace }}/.cache/trivy:/root/.cache/" \
            aquasec/trivy:0.72.0 image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --scanners vuln \
            --format table \
            --exit-code 1 \
            "$GATE_REF"

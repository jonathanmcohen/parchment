name: Release

# Tag-triggered publish. Pushing a `v*` tag (e.g. v0.1.0) on main re-runs the
# full CI gate (typecheck/lint/unit/build/e2e-a11y + carry-forward closed) and,
# only if green, builds + pushes the multi-arch image to GHCR.
#
# The release branch (release/v0.1.0) is NEVER deleted here — the user wants old
# release branches kept. There is no branch-cleanup step anywhere in this file.
on:
  push:
    tags:
      - 'v*'

jobs:
  # Re-run the identical PR/push gate (incl. the e2e+a11y 19-route axe harness and
  # the carry-forward-closed check) so the tag publish can never outrun the gate.
  gate:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # Multi-arch (amd64 + arm64) builds run on the GitHub-hosted runner via QEMU
      # emulation + buildx — the user's stated preference (not local builds).
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/jonathanmcohen/parchment
          # type=ref,event=tag yields the literal git tag (v0.1.0) so the published
          # image name matches the documented ghcr.io/jonathanmcohen/parchment:v0.1.0
          # (scope L1). Plus the moving :latest tag.
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          # CF2: stamp the image with the commit it was built from. version.ts
          # BUILD_SHA reads process.env.GIT_SHA → shown on the /whats-new About page.
          build-args: |
            GIT_SHA=${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # I8: container security scan. Runs AFTER publish so the pushed image is
  # available to pull. Fails the workflow on HIGH or CRITICAL CVE findings.
  # Results are uploaded to the GitHub Security tab as SARIF even on failure.
  #
  # v0.2.5: scan a CONCRETE linux/amd64 DIGEST, not the multi-arch tag. The publish
  # step attaches buildx SBOM + provenance attestations (provenance:true/sbom:true),
  # so the tag's manifest LIST carries two extra `unknown/unknown` in-toto
  # attestation manifests alongside linux/amd64 + linux/arm64. trivy-action@master,
  # resolving the tag in the runner's registry context, scanned/choked on an
  # attestation manifest and exited 1 even though BOTH real platform images are
  # clean (verified: `trivy image <amd64-digest>` and `<arm64-digest>` both report
  # 0 HIGH/CRITICAL with --ignore-unfixed). Resolving the amd64 platform digest up
  # front and scanning THAT makes the gate deterministic and attestation-proof.
  scan:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read           # pull the image + inspect the manifest list
      security-events: write   # required to upload SARIF to GitHub Security tab
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve the linux/amd64 platform digest
        id: digest
        run: |
          set -euo pipefail
          REF="ghcr.io/jonathanmcohen/parchment:${{ github.ref_name }}"
          # imagetools is part of buildx (preinstalled on ubuntu-latest). Pull the
          # per-platform manifest digest for linux/amd64 from the manifest list.
          AMD64_DIGEST="$(docker buildx imagetools inspect "$REF" --format '{{json .}}' \
            | jq -r '.manifest.manifests[]
                     | select(.platform.os=="linux" and .platform.architecture=="amd64")
                     | .digest' | head -n1)"
          if [ -z "$AMD64_DIGEST" ] || [ "$AMD64_DIGEST" = "null" ]; then
            echo "::error::could not resolve a linux/amd64 digest for $REF" >&2
            docker buildx imagetools inspect "$REF" || true
            exit 1
          fi
          echo "ref=ghcr.io/jonathanmcohen/parchment@${AMD64_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Scanning ghcr.io/jonathanmcohen/parchment@${AMD64_DIGEST}"

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          # Concrete amd64 digest → no attestation manifests in the scan target.
          image-ref: ${{ steps.digest.outputs.ref }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          # The remaining HIGH/CRITICAL findings are debian-12 base-image OS CVEs
          # with no upstream patch (fix_deferred / will_not_fix / affected), so a
          # fixed-only gate is what we can actually act on. Unfixed OS CVEs are
          # still uploaded to the Security tab below for visibility.
          ignore-unfixed: true
          exit-code: '1'          # fail the job on FIXED HIGH/CRITICAL findings

      - name: Upload Trivy scan results to GitHub Security tab
        if: always()              # upload even if the scan step above failed
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
